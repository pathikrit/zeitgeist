<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeitgeist Dashboard</title>
<style>
  /* ── Reset & base ──────────────────────────────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d0d0f;
    color: #e0e0e5;
    font-size: 14px;
    line-height: 1.5;
  }
  .hidden { display: none !important; }

  /* ── Topbar ────────────────────────────────────────────────────────────── */
  .topbar {
    background: #0d0d0f;
    padding: 16px 32px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar input {
    width: 100%;
    padding: 10px 16px;
    border: 1px solid #2a2a2e;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    background: #141416;
    color: #e0e0e5;
    transition: border-color .15s;
  }
  .topbar input::placeholder { color: #3a3a3e; }
  .topbar input:focus { border-color: #3a7bd5; background: #16161a; }
  .search-wrap { position: relative; }
  .topbar input { padding-right: 115px; }
  .semantic-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: transparent; border: 1px solid #2a2a2e; color: #555;
    padding: 5px 10px; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-weight: 500; white-space: nowrap;
    transition: border-color .15s, color .15s, background .15s;
  }
  .semantic-btn:hover { border-color: #3a7bd5; color: #3a7bd5; }
  .semantic-btn.active { border-color: #3a7bd5; color: #3a7bd5; background: rgba(58,123,213,.1); }
  .semantic-btn.loading { animation: sem-pulse 1s ease-in-out infinite; cursor: wait; }
  @keyframes sem-pulse { 0%,100% { opacity:1; } 50% { opacity:.35; } }

  /* ── Layout ────────────────────────────────────────────────────────────── */
  .container {
    max-width: 1800px;
    margin: 0 auto;
    padding: 12px 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }
  section { background: #141416; border-radius: 12px; border: 1px solid #2a2a2e; overflow: hidden; }
  .section-header {
    padding: 16px 20px;
    border-bottom: 1px solid #222226;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-header h2 { font-size: 15px; font-weight: 600; color: #f0f0f5; }
  .count {
    background: #222226;
    color: #777;
    border-radius: 20px;
    padding: 1px 8px;
    font-size: 12px;
    font-weight: 500;
  }

  /* ── Predictions table ─────────────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    padding: 10px 20px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: #555;
    background: #111113;
    border-bottom: 1px solid #222226;
    position: sticky;
    top: 57px;
  }
  tbody tr { border-bottom: 1px solid #1c1c20; transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #1a1a1e; }
  td { padding: 12px 20px; vertical-align: top; }
  td.question { max-width: 600px; color: #4a9eff; font-weight: 500; }
  td.question a { color: #4a9eff; text-decoration: none; }
  td.question a:hover { text-decoration: underline; }
  td.answers { min-width: 380px; }

  /* ── Bets ──────────────────────────────────────────────────────────────── */
  .bet { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 13px; }
  .bet:last-child { margin-bottom: 0; }
  .bet-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #aaa; }
  .bet-bar-wrap { width: 160px; height: 6px; background: #2a2a2e; border-radius: 3px; flex-shrink: 0; }
  .bet-bar { height: 6px; border-radius: 3px; background: #3a7bd5; width: var(--bar-pct, 0%); }
  .bet-bar.high  { background: #2ea84a; }
  .bet-bar.low   { background: #c0392b; }
  .bet-bar.other { opacity: .4; }
  .bet-pct { width: 36px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; color: #ccc; font-size: 12px; }

  /* ── Tags ──────────────────────────────────────────────────────────────── */
  .tag {
    display: inline-block;
    background: #2a2200;
    color: #e8c840;
    border-radius: 5px;
    padding: 2px 7px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background .1s;
  }
  .tag:hover { background: #3a3000; }
  mark { background: #7c5c00; color: #ffd060; border-radius: 2px; padding: 0 1px; }

  /* ── Other/toggle bets ─────────────────────────────────────────────────── */
  .other-toggle { cursor: pointer; opacity: .6; }
  .other-toggle:hover { opacity: 1; }
  .other-label { font-style: italic; }
  .other-bets { padding-left: 8px; border-left: 1px solid #2a2a2e; margin: 2px 0 4px; }
  .no-results { padding: 40px 20px; text-align: center; color: #444; }

  /* ── Pagination ────────────────────────────────────────────────────────── */
  .pagination { display: flex; align-items: center; gap: 6px; padding: 10px 20px; border-top: 1px solid #1c1c20; }
  .pagination button { background: #1e1e22; border: 1px solid #2a2a2e; color: #aaa; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .pagination button:hover:not(:disabled) { background: #2a2a2e; color: #fff; }
  .pagination button:disabled { opacity: .3; cursor: default; }
  .pagination button.active { background: #3a7bd5; border-color: #3a7bd5; color: #fff; }
  .pagination-info { font-size: 12px; color: #555; margin-left: 4px; }
  .pagination-ellipsis { font-size: 12px; color: #555; padding: 0 4px; }

  /* ── Catalysts ─────────────────────────────────────────────────────────── */
  .catalyst-list { display: flex; flex-direction: column; }
  .catalyst-row { display: flex; align-items: baseline; gap: 12px; padding: 11px 20px; border-bottom: 1px solid #1c1c20; }
  .catalyst-row:last-child { border-bottom: none; }
  .catalyst-when { flex-shrink: 0; font-size: 12px; color: #555; width: 300px; }
  .catalyst-title { flex: 1; color: #ccc; }
  .catalyst-title a { color: #4a9eff; text-decoration: none; }
  .catalyst-title a:hover { text-decoration: underline; }
  .catalyst-topics { flex-shrink: 0; }

  /* ── News ──────────────────────────────────────────────────────────────── */
  .news-list { display: flex; flex-direction: column; }
  .news-row { padding: 11px 20px; border-bottom: 1px solid #1c1c20; }
  .news-row:last-child { border-bottom: none; }
  .news-row a { color: #ddd; text-decoration: none; font-weight: 500; }
  .news-row a:hover { color: #4a9eff; }
  .news-desc { color: #555; font-size: 13px; margin-top: 2px; }

  /* ── Macro / yield curve ───────────────────────────────────────────────── */
  .macro-top { display: flex; border-bottom: 1px solid #1c1c20; }
  .yield-curve-card { flex: 1; padding: 14px 20px 10px; border-right: 1px solid #1c1c20; min-width: 0; }
  .yield-curve-title { font-weight: 600; font-size: 13px; color: #aaa; margin-bottom: 8px; }
  svg.yield-curve { display: block; width: 100%; overflow: visible; }
  .fg-card { width: 200px; flex-shrink: 0; padding: 14px 20px; display: flex; flex-direction: column; gap: 3px; }
  .fg-title { font-weight: 600; font-size: 13px; color: #aaa; }
  .fg-title a { color: inherit; text-decoration: none; }
  .fg-value { font-size: 48px; font-weight: 300; font-variant-numeric: tabular-nums; line-height: 1.1; margin-top: 4px; }
  .fg-value-unit { font-size: 18px; color: #888; }
  .fg-label { font-size: 13px; font-weight: 600; }
  .fg-date  { font-size: 12px; color: #444; margin-bottom: 6px; }
  #gdpnow-card { border-right: 1px solid #1c1c20; }

  /* Sentiment color classes (Fear & Greed + GDPNow) */
  .color-red    { color: #c0392b; }
  .color-orange { color: #e67e22; }
  .color-yellow { color: #d4ac0d; }
  .color-green  { color: #27ae60; }
  .color-dkgreen{ color: #1e8449; }

  /* ── FRED grid ─────────────────────────────────────────────────────────── */
  .fred-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0; }
  .fred-card { padding: 14px 20px; border-right: 1px solid #1c1c20; border-bottom: 1px solid #1c1c20; }
  .fred-card:hover { background: #1a1a1e; }
  .fred-title { font-weight: 600; font-size: 13px; margin-bottom: 6px; color: #aaa; }
  .fred-title a { color: #aaa; text-decoration: none; }
  .fred-title a:hover { color: #4a9eff; }
  .fred-latest { font-size: 22px; font-weight: 300; font-variant-numeric: tabular-nums; margin-bottom: 6px; color: #f0f0f5; }
  .fred-latest-date { font-size: 13px; color: #444; font-weight: 400; margin-left: 6px; }
  svg.sparkline { display: block; overflow: visible; }

  /* ── Error banner ──────────────────────────────────────────────────────── */
  #error-banner {
    background: #2a1f10;
    border: 1px solid #5a3a10;
    border-radius: 8px;
    padding: 16px 20px;
    margin: 24px 32px 0;
    font-size: 13px;
    color: #c8893a;
  }
  #error-banner code { background: #1a1208; padding: 1px 4px; border-radius: 3px; font-family: monospace; }
</style>
</head>
<body>

<!-- ── Templates ─────────────────────────────────────────────────────────── -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/FlexSearch/0.8.2/flexsearch.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
// ── Constants ────────────────────────────────────────────────────────────────
const PAGE_SIZE = 10;
const COLLAPSE_THRESHOLD   = 3;
const HIGH_CERTAINTY       = 0.98;
const LOW_CERTAINTY        = 0.02;
const BAR_HIGH_THRESHOLD   = 0.65;
const BAR_LOW_THRESHOLD    = 0.25;
const MIN_BET_PROBABILITY  = 0.01;
const VISIBLE_BET_THRESHOLD = 0.05;

const YIELD_CURVE_CODES = new Set(['DGS3MO', 'DGS2', 'DGS5', 'DGS10', 'DGS30']);
const YIELD_MATURITIES  = [
  { code: 'DGS3MO', label: '3M'  },
  { code: 'DGS2',   label: '2Y'  },
  { code: 'DGS5',   label: '5Y'  },
  { code: 'DGS10',  label: '10Y' },
  { code: 'DGS30',  label: '30Y' },
];

const FG_THRESHOLDS = [
  { max: 24,       cls: 'color-red'     },
  { max: 44,       cls: 'color-orange'  },
  { max: 55,       cls: 'color-yellow'  },
  { max: 75,       cls: 'color-green'   },
  { max: Infinity, cls: 'color-dkgreen' },
];

const SPARKLINE_W   = 120;
const SPARKLINE_H   = 32;
const SPARKLINE_PAD = 2;

const YIELD_W    = 500;
const YIELD_H    = 100;
const YIELD_PAD  = { l: 32, r: 12, t: 20, b: 22 };

// ── DOM helpers ───────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const tpl = id => document.getElementById(id).content.cloneNode(true);

function linkEl(url, text) {
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.rel = 'noopener';
  a.textContent = text;
  return a;
}

// ── Highlight helper (mutates a DOM element) ──────────────────────────────────
let currentQuery = '';

function hi(el, text) {
  if (!currentQuery) { el.textContent = text; return; }
  const escaped = currentQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  // Capturing group → odd-indexed parts of split() are the matches
  const parts = text.split(new RegExp(`(${escaped})`, 'gi'));
  parts.forEach((part, i) => {
    if (!part) return;
    if (i % 2 === 1) {
      const mark = document.createElement('mark');
      mark.textContent = part;
      el.appendChild(mark);
    } else {
      el.appendChild(document.createTextNode(part));
    }
  });
}

// ── Tags ──────────────────────────────────────────────────────────────────────
function makeTags(topics, highlight = false) {
  const frag = document.createDocumentFragment();
  (topics || '').split(/[,;]/).map(t => t.trim()).filter(Boolean).forEach(t => {
    const node = tpl('tpl-tag').querySelector('.tag');
    node.dataset.tag = t;
    if (highlight) hi(node, t); else node.textContent = t;
    frag.appendChild(node);
    frag.appendChild(document.createTextNode(' '));
  });
  return frag;
}

// ── Bets ──────────────────────────────────────────────────────────────────────
function barColorClass(p) {
  if (p >= BAR_HIGH_THRESHOLD) return 'high';
  if (p <= BAR_LOW_THRESHOLD)  return 'low';
  return null;
}

function makeBet(b, { fullWidth = false, dimmed = false } = {}) {
  const frag = tpl('tpl-bet');
  const pct  = Math.round(b.probability * 100);
  const label = frag.querySelector('.bet-label');
  label.title = b.prompt;
  hi(label, b.prompt);
  const bar = frag.querySelector('.bet-bar');
  bar.style.setProperty('--bar-pct', fullWidth ? '100%' : pct + '%');
  const cls = fullWidth ? 'high' : barColorClass(b.probability);
  if (cls) bar.classList.add(cls);
  if (dimmed) bar.classList.add('other');
  frag.querySelector('.bet-pct').textContent = pct + '%';
  return frag;
}

// Renders the toggle row + collapsed panel for "others" groups
function makeOtherToggle(oid, labelText, betItems, { showBar = false, barPct = 0 } = {}) {
  const frag   = tpl('tpl-other-toggle');
  const toggle = frag.querySelector('.other-toggle');
  toggle.dataset.oid = oid;
  toggle.querySelector('.other-label').textContent = `\u25B6 ${labelText}`;
  if (showBar) {
    const wrap = document.createElement('div');
    wrap.className = 'bet-bar-wrap';
    const bar = document.createElement('div');
    bar.className = 'bet-bar other';
    bar.style.setProperty('--bar-pct', barPct + '%');
    wrap.appendChild(bar);
    toggle.appendChild(wrap);
    const pctEl = document.createElement('span');
    pctEl.className = 'bet-pct';
    pctEl.textContent = barPct + '%';
    toggle.appendChild(pctEl);
  }
  const panel = frag.querySelector('.other-bets');
  panel.id = oid;
  betItems.forEach(f => panel.appendChild(f));
  return frag;
}

// Shared collapse logic for >COLLAPSE_THRESHOLD high-certainty bets
function buildCollapsedHighBets(sorted, idPrefix) {
  const frag        = document.createDocumentFragment();
  const highCertain = sorted.filter(b => b.probability >= HIGH_CERTAINTY);
  const rest        = sorted.filter(b => b.probability <  HIGH_CERTAINTY);
  const shown       = highCertain[highCertain.length - 1]; // lowest p = most restrictive
  const collapsed   = highCertain.slice(0, -1);
  frag.appendChild(makeBet(shown));
  frag.appendChild(makeOtherToggle(
    idPrefix,
    `Others \u003E98% (${collapsed.length})`,
    collapsed.map(b => makeBet(b)),
  ));
  rest.forEach(b => frag.appendChild(makeBet(b)));
  return frag;
}

function makeBets(p) {
  const isBinary = bets => bets.length === 2 && bets.every(b => /^(yes|no|up|down)$/i.test((b.prompt || '').trim()));
  const raw    = (p.bets || []).filter(b => b.probability > MIN_BET_PROBABILITY);
  const sorted = (isBinary(raw) ? [raw.sort((a, b) => b.probability - a.probability)[0]] : raw)
    .sort((a, b) => b.probability - a.probability);

  const highCertain = sorted.filter(b => b.probability >= HIGH_CERTAINTY);
  if (highCertain.length > COLLAPSE_THRESHOLD) {
    return buildCollapsedHighBets(sorted, `other-${p.id}`);
  }

  const frag  = document.createDocumentFragment();
  const main  = sorted.filter(b => b.probability >= VISIBLE_BET_THRESHOLD);
  const other = sorted.filter(b => b.probability <  VISIBLE_BET_THRESHOLD);
  main.forEach(b => frag.appendChild(makeBet(b)));
  if (other.length > 1) {
    const otherPct = Math.round(other.reduce((s, b) => s + b.probability, 0) * 100);
    frag.appendChild(makeOtherToggle(
      `other-${p.id}`,
      `Others (${other.length})`,
      other.map(b => makeBet(b)),
      { showBar: true, barPct: otherPct },
    ));
  } else {
    other.forEach(b => frag.appendChild(makeBet(b)));
  }
  return frag;
}

function makeConsensusBets(p) {
  const highBets = (p.bets || [])
    .filter(b => b.probability >= HIGH_CERTAINTY)
    .sort((a, b) => a.probability - b.probability); // ascending: lowest p first

  if (highBets.length > COLLAPSE_THRESHOLD) {
    const shown    = highBets[0]; // most restrictive
    const collapsed = highBets.slice(1);
    const frag = document.createDocumentFragment();
    frag.appendChild(makeBet(shown, { fullWidth: true }));
    frag.appendChild(makeOtherToggle(
      `cons-other-${p.id}`,
      `Others \u003E98% (${collapsed.length})`,
      collapsed.map(b => makeBet(b, { fullWidth: true })),
    ));
    return frag;
  }

  const winner = highBets[highBets.length - 1]; // highest p for simple case
  return winner ? makeBet(winner, { fullWidth: true }) : document.createDocumentFragment();
}

// ── Pagination ────────────────────────────────────────────────────────────────
function windowedPages(cur, total) {
  const delta = 2;
  const pages = new Set([0, total - 1]);
  for (let i = Math.max(0, cur - delta); i <= Math.min(total - 1, cur + delta); i++) pages.add(i);
  const sorted = [...pages].sort((a, b) => a - b);
  const result = [];
  let prev = -1;
  for (const p of sorted) {
    if (p - prev > 1) result.push(null); // null = ellipsis
    result.push(p);
    prev = p;
  }
  return result;
}

function buildPagination(container, cur, total, totalItems, onPage) {
  container.innerHTML = '';
  const mkBtn = (label, page, disabled, active) => {
    const btn = document.createElement('button');
    btn.textContent = label;
    if (disabled) { btn.disabled = true; }
    if (active)   { btn.classList.add('active'); }
    if (!disabled) btn.addEventListener('click', () => onPage(page));
    return btn;
  };
  container.appendChild(mkBtn('\u2039', cur - 1, cur === 0, false));
  windowedPages(cur, total).forEach(p => {
    if (p === null) {
      const el = document.createElement('span');
      el.className = 'pagination-ellipsis';
      el.textContent = '\u2026';
      container.appendChild(el);
    } else {
      container.appendChild(mkBtn(p + 1, p, false, p === cur));
    }
  });
  container.appendChild(mkBtn('\u203A', cur + 1, cur >= total - 1, false));
  const info = document.createElement('span');
  info.className = 'pagination-info';
  info.textContent = `${cur * PAGE_SIZE + 1}\u2013${Math.min((cur + 1) * PAGE_SIZE, totalItems)} of ${totalItems}`;
  container.appendChild(info);
}

// Generic paginator — renders one page and wires the nav controls
function paginate(state, items, renderPage) {
  const total = Math.ceil(items.length / PAGE_SIZE);
  state.page  = Math.min(state.page, Math.max(0, total - 1));
  renderPage(items.slice(state.page * PAGE_SIZE, (state.page + 1) * PAGE_SIZE));
  const pagEl = $(state.paginationId);
  if (total <= 1) { pagEl.classList.add('hidden'); return; }
  pagEl.classList.remove('hidden');
  buildPagination(pagEl, state.page, total, items.length, n => {
    state.page = n;
    paginate(state, items, renderPage);
    $(state.scrollTarget).scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

// ── Sparkline ─────────────────────────────────────────────────────────────────
function sparkline(data, width = SPARKLINE_W, height = SPARKLINE_H) {
  const vals = data.map(d => d.value).filter(v => v != null && !isNaN(v));
  if (vals.length < 2) return null;
  const min   = Math.min(...vals);
  const max   = Math.max(...vals);
  const range = max - min || 1;
  const pad   = SPARKLINE_PAD;
  const pts   = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1)) * (width  - pad * 2);
    const y = pad + (1 - (v - min) / range)  * (height - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  const ns   = 'http://www.w3.org/2000/svg';
  const svg  = document.createElementNS(ns, 'svg');
  svg.setAttribute('class', 'sparkline');
  svg.setAttribute('width', width);
  svg.setAttribute('height', height);
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);

  const poly = document.createElementNS(ns, 'polyline');
  poly.setAttribute('points', pts);
  poly.setAttribute('fill', 'none');
  poly.setAttribute('stroke', '#3a7bd5');
  poly.setAttribute('stroke-width', '1.5');
  poly.setAttribute('stroke-linejoin', 'round');
  poly.setAttribute('stroke-linecap', 'round');
  svg.appendChild(poly);
  return svg;
}

// ── Render: Yield Curve ───────────────────────────────────────────────────────
function renderYieldCurve(fredItems) {
  const byCode = Object.fromEntries(fredItems.filter(f => f.code).map(f => [f.code, f]));
  const points = YIELD_MATURITIES.map(m => {
    const s = byCode[m.code];
    if (!s?.data?.length) return null;
    const v = parseFloat(s.data[s.data.length - 1].value);
    return isNaN(v) ? null : { label: m.label, value: v };
  }).filter(Boolean);

  const el = $('yield-curve-card');
  if (points.length < 2) { el.classList.add('hidden'); return; }

  const { l: padL, r: padR, t: padT, b: padB } = YIELD_PAD;
  const innerW = YIELD_W - padL - padR;
  const innerH = YIELD_H - padT - padB;
  const vals   = points.map(p => p.value);
  const minV   = Math.min(...vals);
  const maxV   = Math.max(...vals);
  const range  = maxV - minV || 0.5;
  const xStep  = innerW / (points.length - 1);

  const svgPts = points.map((p, i) => ({
    ...p,
    x: padL + i * xStep,
    y: padT + (1 - (p.value - minV) / range) * innerH,
  }));

  const ns   = 'http://www.w3.org/2000/svg';
  const mkSvgEl = (tag, attrs) => {
    const el = document.createElementNS(ns, tag);
    Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
    return el;
  };

  const svg = mkSvgEl('svg', { class: 'yield-curve', viewBox: `0 0 ${YIELD_W} ${YIELD_H}` });

  svg.appendChild(mkSvgEl('line', {
    x1: padL, y1: padT, x2: padL, y2: padT + innerH,
    stroke: '#2a2a2e', 'stroke-width': 1,
  }));

  [minV, (minV + maxV) / 2, maxV].forEach(v => {
    const y = padT + (1 - (v - minV) / range) * innerH;
    const t = mkSvgEl('text', { x: padL - 4, y: y.toFixed(1), 'text-anchor': 'end', 'dominant-baseline': 'middle', fill: '#444', 'font-size': 9 });
    t.textContent = v.toFixed(2);
    svg.appendChild(t);
  });

  svg.appendChild(mkSvgEl('polyline', {
    points: svgPts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '),
    fill: 'none', stroke: '#3a7bd5', 'stroke-width': 1.5,
    'stroke-linejoin': 'round', 'stroke-linecap': 'round',
  }));

  svgPts.forEach(p => {
    svg.appendChild(mkSvgEl('circle', { cx: p.x.toFixed(1), cy: p.y.toFixed(1), r: 3, fill: '#3a7bd5' }));
    const valT = mkSvgEl('text', { x: p.x.toFixed(1), y: (p.y - 7).toFixed(1), 'text-anchor': 'middle', fill: '#aaa', 'font-size': 9 });
    valT.textContent = p.value.toFixed(2);
    svg.appendChild(valT);
    const lblT = mkSvgEl('text', { x: p.x.toFixed(1), y: (YIELD_H - 4).toFixed(1), 'text-anchor': 'middle', fill: '#555', 'font-size': 9 });
    lblT.textContent = p.label;
    svg.appendChild(lblT);
  });

  el.innerHTML = '';
  const title = document.createElement('div');
  title.className = 'yield-curve-title';
  title.textContent = 'Yield Curve';
  el.appendChild(title);
  el.appendChild(svg);
}

// ── State ─────────────────────────────────────────────────────────────────────
let allPredictions = [], allConsensusPredictions = [], allCatalysts = [], allNews = [], allFred = [];
let predIdx, consensusIdx, catIdx, newsIdx, fredIdx;
let currentPredRows = [], currentConsensusRows = [], currentCatRows = [], currentNewsRows = [];

const predState      = { page: 0, paginationId: 'pred-pagination',      scrollTarget: 'pred-table-wrap'      };
const consensusState = { page: 0, paginationId: 'consensus-pagination',  scrollTarget: 'consensus-table-wrap' };
const catState       = { page: 0, paginationId: 'cat-pagination',        scrollTarget: 'catalyst-wrap'        };
const newsState      = { page: 0, paginationId: 'news-pagination',       scrollTarget: 'news-wrap'            };

// ── Search & indexing ─────────────────────────────────────────────────────────
function getTags(p) {
  return (p.topics || '').split(/[,;]/).map(t => t.trim().toLowerCase()).filter(Boolean);
}

// Tag-diversity re-ranking in O(n): items with a previously-seen tag are deferred
// with half their volume score, then merged back in sorted order.
function diverseSort(items) {
  const seen = new Set();
  const primary = [], deferred = [];
  for (const item of items) {
    const tags = getTags(item);
    const hasSeenTag = tags.some(t => seen.has(t));
    tags.forEach(t => seen.add(t));
    const score = item.volume_24h || 0;
    (hasSeenTag ? deferred : primary).push({ item, score: hasSeenTag ? score / 2 : score });
  }
  const result = [];
  let di = 0;
  for (const { item, score } of primary) {
    while (di < deferred.length && deferred[di].score > score) result.push(deferred[di++].item);
    result.push(item);
  }
  while (di < deferred.length) result.push(deferred[di++].item);
  return result;
}

function idxSearch(idx, q, items) {
  const hits = new Set(idx.search(q).flatMap(r => r.result));
  return items.filter((_, i) => hits.has(i));
}

function buildIndexes() {
  const mkIdx = (items, getDoc) => {
    const fields = Object.keys(getDoc(items[0] || {}));
    const idx    = new FlexSearch.Document({ tokenize: 'forward', document: { id: 'id', index: fields } });
    items.forEach((item, i) => idx.add({ id: i, ...getDoc(item) }));
    return idx;
  };
  const predDoc = p => ({
    title:  p.title   || '',
    topics: p.topics  || '',
    bets:   (p.bets || []).map(b => b.prompt || '').filter(s => !/^(yes|no|up|down)$/i.test(s.trim())).join(' '),
  });
  predIdx      = mkIdx(allPredictions,          predDoc);
  consensusIdx = mkIdx(allConsensusPredictions,  predDoc);
  catIdx       = mkIdx(allCatalysts, c => ({ title: c.title || '', topics: c.topics || '', when: c.when || '' }));
  newsIdx      = mkIdx(allNews,      n => ({ title: n.title || '', description: n.description || '' }));
  fredIdx      = mkIdx(allFred,      f => ({ title: f.title || '' }));
}

function applySearch(q) {
  q = q.trim().toLowerCase();
  currentQuery = q;
  const search = (idx, all) => q ? idxSearch(idx, q, all) : all;

  const filteredPreds = search(predIdx, allPredictions);
  $('pred-count').textContent = q ? `${filteredPreds.length} / ${allPredictions.length}` : allPredictions.length;
  predState.page  = 0;
  currentPredRows = q ? filteredPreds : diverseSort(filteredPreds);
  renderPredictions(currentPredRows);

  const filteredConsensus = search(consensusIdx, allConsensusPredictions);
  $('consensus-count').textContent = q ? `${filteredConsensus.length} / ${allConsensusPredictions.length}` : allConsensusPredictions.length;
  consensusState.page  = 0;
  currentConsensusRows = q ? filteredConsensus : diverseSort(filteredConsensus);
  renderConsensus(currentConsensusRows);

  const filteredCats = search(catIdx, allCatalysts);
  $('cat-count').textContent = q ? `${filteredCats.length} / ${allCatalysts.length}` : allCatalysts.length;
  catState.page  = 0;
  currentCatRows = filteredCats;
  renderCatalysts(currentCatRows);

  const filteredNews = search(newsIdx, allNews);
  $('news-count').textContent = q ? `${filteredNews.length} / ${allNews.length}` : allNews.length;
  newsState.page  = 0;
  currentNewsRows = filteredNews;
  renderNews(currentNewsRows);

  const filteredFred = search(fredIdx, allFred);
  $('fred-count').textContent = q ? `${filteredFred.length} / ${allFred.length}` : allFred.length;
  renderFred(filteredFred);
}

// ── Semantic Search ───────────────────────────────────────────────────────────
// Pre-built embeddings (384-dim, L2-normalised all-MiniLM-L6-v2) are shipped in
// embeddings.json alongside output.json.  Query encoding runs in-browser via
// @xenova/transformers using the same model, so dot-product == cosine similarity.

let semanticMode = false;
let _embCache = null, _pipeCache = null, _pipePromise = null, _semTimer = null;

const SEMANTIC_THRESHOLD = 0.20; // minimum cosine similarity to surface a result

async function _loadPipeline() {
  if (_pipeCache) return _pipeCache;
  if (!_pipePromise) {
    _pipePromise = import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2')
      .then(({ pipeline }) => pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2'))
      .then(p => { _pipeCache = p; return p; });
  }
  return _pipePromise;
}

async function _loadEmbs() {
  if (_embCache) return _embCache;
  const r = await fetch('embeddings.json').then(r => r.ok ? r : fetch('.reports/embeddings.json'));
  if (!r.ok) throw new Error('embeddings.json not found');
  _embCache = await r.json();
  return _embCache;
}

function _dot(a, b) { let s = 0; for (let i = 0; i < a.length; i++) s += a[i] * b[i]; return s; }

async function applySemanticSearch(q) {
  q = q.trim();
  if (!q) { currentQuery = ''; applySearch(''); return; }
  const btn = $('semantic-btn');
  btn.classList.add('loading');
  try {
    const [pipe, embs] = await Promise.all([_loadPipeline(), _loadEmbs()]);
    const out  = await pipe(q, { pooling: 'mean', normalize: true });
    const qEmb = Array.from(out.data);
    btn.classList.remove('loading');
    currentQuery = ''; // suppress keyword highlights in semantic mode

    const byKey = (items, map, kFn) => {
      if (!map) return items;
      return items
        .map(x => ({ x, s: _dot(qEmb, map[kFn(x)] || []) }))
        .filter(({ s }) => s >= SEMANTIC_THRESHOLD)
        .sort((a, b) => b.s - a.s)
        .map(({ x }) => x);
    };

    const byIdx = (items, arr) => {
      if (!arr) return items;
      return items
        .map((x, i) => ({ x, s: _dot(qEmb, arr[i] || []) }))
        .filter(({ s }) => s >= SEMANTIC_THRESHOLD)
        .sort((a, b) => b.s - a.s)
        .map(({ x }) => x);
    };

    const pMap = embs.predictions || {};
    const rP   = byKey(allPredictions,         pMap, p => p.id);
    const rC   = byKey(allConsensusPredictions, pMap, p => p.id);
    const rCat = byIdx(allCatalysts, embs.catalysts);
    const rN   = byIdx(allNews,      embs.news);
    const filtFred = q ? idxSearch(fredIdx, q, allFred) : allFred;

    $('pred-count').textContent      = `${rP.length} / ${allPredictions.length}`;
    predState.page = 0; renderPredictions(rP);

    $('consensus-count').textContent = `${rC.length} / ${allConsensusPredictions.length}`;
    consensusState.page = 0; renderConsensus(rC);

    $('cat-count').textContent       = `${rCat.length} / ${allCatalysts.length}`;
    catState.page = 0; renderCatalysts(rCat);

    $('news-count').textContent      = `${rN.length} / ${allNews.length}`;
    newsState.page = 0; renderNews(rN);

    $('fred-count').textContent = q ? `${filtFred.length} / ${allFred.length}` : allFred.length;
    renderFred(filtFred);
  } catch (err) {
    console.error('Semantic search error:', err);
    btn.classList.remove('loading');
    semanticMode = false;
    btn.classList.remove('active');
    btn.textContent = '≈ Semantic';
    applySearch(q);
  }
}

// ── Event delegation ──────────────────────────────────────────────────────────
$('pred-search').addEventListener('input', function () {
  if (semanticMode) {
    clearTimeout(_semTimer);
    _semTimer = setTimeout(() => applySemanticSearch(this.value), 350);
  } else {
    applySearch(this.value);
  }
});

$('semantic-btn').addEventListener('click', function () {
  semanticMode = !semanticMode;
  this.classList.toggle('active', semanticMode);
  this.textContent = semanticMode ? '≈ Semantic ✓' : '≈ Semantic';
  clearTimeout(_semTimer);
  const q = $('pred-search').value;
  if (semanticMode && q.trim()) applySemanticSearch(q);
  else { currentQuery = ''; applySearch(q); }
});

['pred-tbody', 'consensus-tbody', 'catalyst-list'].forEach(id => {
  $(id).addEventListener('click', e => {
    const tag = e.target.closest('.clickable-tag');
    if (tag) {
      const input = $('pred-search');
      input.value = tag.dataset.tag;
      applySearch(tag.dataset.tag);
      input.focus();
      return;
    }
    const toggle = e.target.closest('.other-toggle');
    if (toggle) {
      const panel    = $(toggle.dataset.oid);
      if (!panel) return;
      const expanded = !panel.classList.contains('hidden');
      panel.classList.toggle('hidden', expanded);
      const label = toggle.querySelector('.other-label');
      label.textContent = (expanded ? '\u25B6' : '\u25BC') + label.textContent.slice(1);
    }
  });
});

// ── Data loading ──────────────────────────────────────────────────────────────
function isConsensus(p) {
  const bets = (p.bets || []).filter(b => b.probability > 0);
  return bets.length > 0
    && bets.some(b => b.probability >= HIGH_CERTAINTY)
    && bets.every(b => b.probability >= HIGH_CERTAINTY || b.probability < LOW_CERTAINTY);
}

fetch('output.json')
  .then(r => r.ok ? r : fetch('.reports/output.json'))
  .then(r => { if (!r.ok) throw new Error(r.statusText); return r.text(); })
  .then(t => JSON.parse(t.replace(/:\s*NaN\b/g, ': null')))
  .then(data => {
    const active = (data.relevant_predictions || [])
      .filter(p => p.volume_24h > 0)
      .sort((a, b) => b.volume_24h - a.volume_24h);
    allConsensusPredictions = active.filter(isConsensus);
    allPredictions          = active.filter(p => !isConsensus(p));
    allCatalysts = data.upcoming_catalysts || [];
    allNews      = data.news_headlines     || [];
    allFred      = data.fred_data          || [];

    buildIndexes();
    applySearch('');

    renderYieldCurve(allFred);
    renderGDPNow(data.gdpnow      || null);
    renderFearGreed(data.fear_greed || null);

    const hasMacro = allFred.length || data.fear_greed?.length || data.gdpnow;
    if (!hasMacro)        $('section-fred').classList.add('hidden');
    if (!allNews.length)  $('section-news').classList.add('hidden');
  })
  .catch(err => {
    console.error(err);
    const banner = $('error-banner');
    banner.classList.remove('hidden');
    banner.appendChild(document.createElement('br'));
    const code = document.createElement('code');
    code.textContent = String(err);
    banner.appendChild(code);
