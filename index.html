<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeitgeist Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d0d0f;
    color: #e0e0e5;
    font-size: 14px;
    line-height: 1.5;
  }

  .topbar {
    background: #0d0d0f;
    padding: 16px 32px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar input {
    width: 100%;
    padding: 10px 16px;
    border: 1px solid #2a2a2e;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    background: #141416;
    color: #e0e0e5;
    transition: border-color .15s;
  }
  .topbar input::placeholder { color: #3a3a3e; }
  .topbar input:focus { border-color: #3a7bd5; background: #16161a; }

  .container { max-width: 1800px; margin: 0 auto; padding: 12px 32px 24px; display: flex; flex-direction: column; gap: 32px; }

  section { background: #141416; border-radius: 12px; border: 1px solid #2a2a2e; overflow: hidden; }

  .section-header {
    padding: 16px 20px;
    border-bottom: 1px solid #222226;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-header h2 { font-size: 15px; font-weight: 600; color: #f0f0f5; }
  .section-header .count {
    background: #222226;
    color: #777;
    border-radius: 20px;
    padding: 1px 8px;
    font-size: 12px;
    font-weight: 500;
  }


  /* Predictions table */
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    padding: 10px 20px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: #555;
    background: #111113;
    border-bottom: 1px solid #222226;
    position: sticky;
    top: 57px;
  }
  tbody tr { border-bottom: 1px solid #1c1c20; transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #1a1a1e; }
  td { padding: 12px 20px; vertical-align: top; }

  td.question { max-width: 600px; color: #4a9eff; font-weight: 500; }
  td.question a { color: #4a9eff; text-decoration: none; }
  td.question a:hover { text-decoration: underline; }

  td.answers { min-width: 380px; }
  .bet { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 13px; }
  .bet:last-child { margin-bottom: 0; }
  .bet-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #aaa; }
  .bet-bar-wrap { width: 160px; height: 6px; background: #2a2a2e; border-radius: 3px; flex-shrink: 0; }
  .bet-bar { height: 6px; border-radius: 3px; background: #3a7bd5; }
  .bet-bar.high { background: #2ea84a; }
  .bet-bar.low  { background: #c0392b; }
  .bet-pct { width: 36px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; color: #ccc; font-size: 12px; }

  .tag {
    display: inline-block;
    background: #2a2200;
    color: #e8c840;
    border-radius: 5px;
    padding: 2px 7px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background .1s;
  }
  .tag:hover { background: #3a3000; }

mark { background: #7c5c00; color: #ffd060; border-radius: 2px; padding: 0 1px; }

  .other-toggle { cursor: pointer; opacity: .6; }
  .other-toggle:hover { opacity: 1; }
  .other-label { font-style: italic; }
  .other-bets { padding-left: 8px; border-left: 1px solid #2a2a2e; margin: 2px 0 4px; }

  .no-results { padding: 40px 20px; text-align: center; color: #444; }

  .pagination { display: flex; align-items: center; gap: 6px; padding: 10px 20px; border-top: 1px solid #1c1c20; }
  .pagination button { background: #1e1e22; border: 1px solid #2a2a2e; color: #aaa; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .pagination button:hover:not(:disabled) { background: #2a2a2e; color: #fff; }
  .pagination button:disabled { opacity: .3; cursor: default; }
  .pagination button.active { background: #3a7bd5; border-color: #3a7bd5; color: #fff; }
  .pagination-info { font-size: 12px; color: #555; margin-left: 4px; }

  /* Catalysts */
  .catalyst-list { display: flex; flex-direction: column; }
  .catalyst-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 11px 20px;
    border-bottom: 1px solid #1c1c20;
  }
  .catalyst-row:last-child { border-bottom: none; }
  .catalyst-when {
    flex-shrink: 0;
    font-size: 12px;
    color: #555;
    width: 300px;
  }
  .catalyst-title { flex: 1; color: #ccc; }
  .catalyst-title a { color: #4a9eff; text-decoration: none; }
  .catalyst-title a:hover { text-decoration: underline; }
  .catalyst-topics { flex-shrink: 0; }

  /* News */
  .news-list { display: flex; flex-direction: column; }
  .news-row {
    padding: 11px 20px;
    border-bottom: 1px solid #1c1c20;
  }
  .news-row:last-child { border-bottom: none; }
  .news-row a { color: #ddd; text-decoration: none; font-weight: 500; }
  .news-row a:hover { color: #4a9eff; }
  .news-desc { color: #555; font-size: 13px; margin-top: 2px; }

  /* Macro top (yield curve + fear & greed) */
  .macro-top {
    display: flex;
    border-bottom: 1px solid #1c1c20;
  }
  .yield-curve-card {
    flex: 1;
    padding: 14px 20px 10px;
    border-right: 1px solid #1c1c20;
    min-width: 0;
  }
  .yield-curve-title { font-weight: 600; font-size: 13px; color: #aaa; margin-bottom: 8px; }
  svg.yield-curve { display: block; width: 100%; overflow: visible; }
  .fg-card {
    width: 200px;
    flex-shrink: 0;
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .fg-title { font-weight: 600; font-size: 13px; color: #aaa; }
  .fg-value { font-size: 48px; font-weight: 300; font-variant-numeric: tabular-nums; line-height: 1.1; margin-top: 4px; }
  .fg-label { font-size: 13px; font-weight: 600; }
  .fg-date  { font-size: 12px; color: #444; margin-bottom: 6px; }
  #gdpnow-card { border-right: 1px solid #1c1c20; }

  /* FRED */
  .fred-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0;
  }
  .fred-card {
    padding: 14px 20px;
    border-right: 1px solid #1c1c20;
    border-bottom: 1px solid #1c1c20;
  }
  .fred-card:hover { background: #1a1a1e; }
  .fred-title { font-weight: 600; font-size: 13px; margin-bottom: 6px; color: #aaa; }
  .fred-title a { color: #aaa; text-decoration: none; }
  .fred-title a:hover { color: #4a9eff; }
  .fred-latest {
    font-size: 22px;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    margin-bottom: 6px;
    color: #f0f0f5;
  }
  .fred-latest span { font-size: 13px; color: #444; font-weight: 400; margin-left: 6px; }
  svg.sparkline { display: block; overflow: visible; }

  /* Error */
  #error-banner {
    display: none;
    background: #2a1f10;
    border: 1px solid #5a3a10;
    border-radius: 8px;
    padding: 16px 20px;
    margin: 24px 32px 0;
    font-size: 13px;
    color: #c8893a;
  }
  #error-banner code { background: #1a1208; padding: 1px 4px; border-radius: 3px; font-family: monospace; }
</style>
</head>
<body>

<div class="topbar">
  <input type="search" id="pred-search" placeholder="Search..." autocomplete="off">
</div>

<div id="error-banner">
  Could not load <strong>.reports/output.json</strong>. If opening from <code>file://</code>, serve locally instead:<br>
  <code>python3 -m http.server 8000</code> then open <code>http://localhost:8000/dashboard.html</code>
</div>

<div class="container">

  <section id="section-predictions">
    <div class="section-header">
      <h2>Prediction Markets</h2>
      <span class="count" id="pred-count"></span>
    </div>
    <div id="pred-table-wrap">
      <table>
        <thead style="display:none"></thead>
        <tbody id="pred-tbody"></tbody>
      </table>
      <div class="no-results" id="pred-no-results" style="display:none">No matching predictions</div>
      <div class="pagination" id="pred-pagination" style="display:none"></div>
    </div>
  </section>

  <section id="section-consensus">
    <div class="section-header">
      <h2>Consensus</h2>
      <span class="count" id="consensus-count"></span>
    </div>
    <div id="consensus-table-wrap">
      <table>
        <thead style="display:none"></thead>
        <tbody id="consensus-tbody"></tbody>
      </table>
      <div class="no-results" id="consensus-no-results" style="display:none">No matching predictions</div>
      <div class="pagination" id="consensus-pagination" style="display:none"></div>
    </div>
  </section>

  <section id="section-catalysts">
    <div class="section-header">
      <h2>Upcoming Catalysts</h2>
      <span class="count" id="cat-count"></span>
    </div>
    <div id="catalyst-wrap">
      <div class="catalyst-list" id="catalyst-list"></div>
      <div class="pagination" id="cat-pagination" style="display:none"></div>
    </div>
  </section>

  <section id="section-news">
    <div class="section-header">
      <h2>News Headlines</h2>
      <span class="count" id="news-count"></span>
    </div>
    <div id="news-wrap">
      <div class="news-list" id="news-list"></div>
      <div class="pagination" id="news-pagination" style="display:none"></div>
    </div>
  </section>

  <section id="section-fred">
    <div class="section-header">
      <h2>Macro Indicators</h2>
      <span class="count" id="fred-count"></span>
    </div>
    <div class="macro-top" id="macro-top">
      <div class="yield-curve-card" id="yield-curve-card"></div>
      <div class="fg-card" id="gdpnow-card"></div>
      <div class="fg-card" id="fg-card"></div>
    </div>
    <div class="fred-grid" id="fred-grid"></div>
  </section>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/FlexSearch/0.8.2/flexsearch.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const tagsHtml = (topics, highlight = false) =>
  (topics || '').split(/[,;]/).map(t => t.trim()).filter(Boolean)
    .map(t => `<span class="tag clickable-tag" data-tag="${esc(t)}">${highlight ? hi(t) : esc(t)}</span>`).join(' ');

let currentQuery = '';
function hi(s) {
  const safe = esc(s);
  if (!currentQuery) return safe;
  const re = new RegExp(`(${currentQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

function barColor(p) {
  if (p >= 0.65) return 'high';
  if (p <= 0.25) return 'low';
  return '';
}

function betHtml(b) {
  const pct = Math.round(b.probability * 100);
  return `<div class="bet">
    <span class="bet-label" title="${esc(b.prompt)}">${hi(b.prompt)}</span>
    <div class="bet-bar-wrap"><div class="bet-bar ${barColor(b.probability)}" style="width:${pct}%"></div></div>
    <span class="bet-pct">${pct}%</span>
  </div>`;
}

function betsHtml(p) {
  const isBinary = bets => bets.length === 2 && bets.every(b => /^(yes|no|up|down)$/i.test((b.prompt || '').trim()));
  const raw = (p.bets || []).filter(b => b.probability > 0.01);
  const sorted = (isBinary(raw) ? [raw.sort((a, b) => b.probability - a.probability)[0]] : raw)
    .sort((a, b) => b.probability - a.probability);

  // If >3 bets are near-certain (>=98%), show only the lowest (most restrictive) and collapse the rest
  const highCertainty = sorted.filter(b => b.probability >= 0.98);
  if (highCertainty.length > 3) {
    const shownHigh = highCertainty[highCertainty.length - 1]; // lowest p (most restrictive)
    const collapsedHigh = highCertainty.slice(0, -1);
    const rest = sorted.filter(b => b.probability < 0.98);
    const oid = 'other-' + esc(p.id);
    const collapsedHtml = collapsedHigh.map(betHtml).join('');
    return betHtml(shownHigh) +
      `<div class="bet other-toggle" data-oid="${oid}">
        <span class="bet-label other-label">&#9654; Others &gt;98% (${collapsedHigh.length})</span>
      </div>
      <div class="other-bets" id="${oid}" style="display:none">${collapsedHtml}</div>` +
      rest.map(betHtml).join('');
  }

  const main  = sorted.filter(b => b.probability >= 0.05);
  const other = sorted.filter(b => b.probability <  0.05);
  let html = main.map(betHtml).join('');
  if (other.length > 1) {
    const otherPct = Math.round(other.reduce((s, b) => s + b.probability, 0) * 100);
    const oid = 'other-' + esc(p.id);
    html += `<div class="bet other-toggle" data-oid="${oid}">
      <span class="bet-label other-label">&#9654; Others (${other.length})</span>
      <div class="bet-bar-wrap"><div class="bet-bar" style="width:${otherPct}%;opacity:.4"></div></div>
      <span class="bet-pct">${otherPct}%</span>
    </div>
    <div class="other-bets" id="${oid}" style="display:none">${other.map(betHtml).join('')}</div>`;
  } else {
    html += other.map(betHtml).join('');
  }
  return html;
}

function windowedPages(cur, total) {
  const delta = 2;
  const pages = new Set([0, total - 1]);
  for (let i = Math.max(0, cur - delta); i <= Math.min(total - 1, cur + delta); i++) pages.add(i);
  const sorted = [...pages].sort((a, b) => a - b);
  const result = [];
  let prev = -1;
  for (const p of sorted) {
    if (p - prev > 1) result.push(null); // ellipsis
    result.push(p);
    prev = p;
  }
  return result;
}

function buildPagination(cur, total, pageSize, totalItems, onPageFn) {
  const prevBtn = `<button ${cur === 0 ? 'disabled' : ''} onclick="${onPageFn}(${cur - 1})">&#8249;</button>`;
  const nextBtn = `<button ${cur >= total - 1 ? 'disabled' : ''} onclick="${onPageFn}(${cur + 1})">&#8250;</button>`;
  const pages = windowedPages(cur, total).map(p =>
    p === null
      ? `<span class="pagination-info" style="padding:0 4px">…</span>`
      : `<button class="${p === cur ? 'active' : ''}" onclick="${onPageFn}(${p})">${p + 1}</button>`
  ).join('');
  const info = `<span class="pagination-info">${cur * pageSize + 1}–${Math.min((cur + 1) * pageSize, totalItems)} of ${totalItems}</span>`;
  return prevBtn + pages + nextBtn + info;
}

function renderPredictions(rows) {
  const tbody = document.getElementById('pred-tbody');
  const pagEl = document.getElementById('pred-pagination');
  if (!rows.length) {
    tbody.innerHTML = '';
    pagEl.style.display = 'none';
    document.getElementById('pred-no-results').style.display = '';
    return;
  }
  document.getElementById('pred-no-results').style.display = 'none';
  const pageSize = 10;
  const totalPages = Math.ceil(rows.length / pageSize);
  predPage = Math.min(predPage, totalPages - 1);
  const pageRows = rows.slice(predPage * pageSize, (predPage + 1) * pageSize);
  tbody.innerHTML = pageRows.map(p => {
    const titleHtml = p.url
      ? `<a href="${esc(p.url)}" target="_blank" rel="noopener">${hi(p.title)}</a>`
      : hi(p.title);
    return `<tr data-title="${esc(p.title)}" data-topics="${esc(p.topics||'')}">
      <td class="question">${titleHtml}</td>
      <td class="answers">${betsHtml(p)}</td>
      <td class="topics">${tagsHtml(p.topics, true)}</td>
    </tr>`;
  }).join('');
  if (totalPages <= 1) { pagEl.style.display = 'none'; return; }
  pagEl.style.display = 'flex';
  pagEl.innerHTML = buildPagination(predPage, totalPages, pageSize, rows.length, 'goPredPage');
}

function goPredPage(n) {
  predPage = n;
  renderPredictions(currentPredRows);
  document.getElementById('pred-table-wrap').scrollIntoView({behavior: 'smooth', block: 'start'});
}

function renderCatalysts(items) {
  const el = document.getElementById('catalyst-list');
  const pagEl = document.getElementById('cat-pagination');
  const pageSize = 10;
  const totalPages = Math.ceil(items.length / pageSize);
  catPage = Math.min(catPage, Math.max(0, totalPages - 1));
  const pageItems = items.slice(catPage * pageSize, (catPage + 1) * pageSize);
  el.innerHTML = pageItems.map(c => {
    const titleHtml = c.url
      ? `<a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.title)}</a>`
      : esc(c.title);
    return `<div class="catalyst-row">
      <span class="catalyst-when">${esc(c.when || '')}</span>
      <span class="catalyst-title">${titleHtml}</span>
      ${c.topics ? `<span class="catalyst-topics">${tagsHtml(c.topics)}</span>` : ''}
    </div>`;
  }).join('');
  if (totalPages <= 1) { pagEl.style.display = 'none'; return; }
  pagEl.style.display = 'flex';
  pagEl.innerHTML = buildPagination(catPage, totalPages, pageSize, items.length, 'goCatPage');
}

function goCatPage(n) {
  catPage = n;
  renderCatalysts(currentCatRows);
  document.getElementById('catalyst-wrap').scrollIntoView({behavior: 'smooth', block: 'start'});
}

function renderNews(items) {
  const el = document.getElementById('news-list');
  const pagEl = document.getElementById('news-pagination');
  const pageSize = 10;
  const totalPages = Math.ceil(items.length / pageSize);
  newsPage = Math.min(newsPage, Math.max(0, totalPages - 1));
  const pageItems = items.slice(newsPage * pageSize, (newsPage + 1) * pageSize);
  el.innerHTML = pageItems.map(n => {
    const titleHtml = n.url
      ? `<a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.title)}</a>`
      : esc(n.title);
    return `<div class="news-row">
      <div>${titleHtml}</div>
      ${n.description ? `<div class="news-desc">${esc(n.description)}</div>` : ''}
    </div>`;
  }).join('');
  if (totalPages <= 1) { pagEl.style.display = 'none'; return; }
  pagEl.style.display = 'flex';
  pagEl.innerHTML = buildPagination(newsPage, totalPages, pageSize, items.length, 'goNewsPage');
}

function goNewsPage(n) {
  newsPage = n;
  renderNews(currentNewsRows);
  document.getElementById('news-wrap').scrollIntoView({behavior: 'smooth', block: 'start'});
}

function sparkline(data, width=120, height=32) {
  const vals = data.map(d => d.value).filter(v => v != null && !isNaN(v));
  if (vals.length < 2) return '';
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const pad = 2;
  const pts = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1)) * (width - pad * 2);
    const y = pad + (1 - (v - min) / range) * (height - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg class="sparkline" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
    <polyline points="${pts}" fill="none" stroke="#3a7bd5" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

const YIELD_CURVE_CODES = new Set(['DGS3MO', 'DGS2', 'DGS5', 'DGS10', 'DGS30']);
const YIELD_MATURITIES = [
  { code: 'DGS3MO', label: '3M' },
  { code: 'DGS2',   label: '2Y' },
  { code: 'DGS5',   label: '5Y' },
  { code: 'DGS10',  label: '10Y' },
  { code: 'DGS30',  label: '30Y' },
];

function fgColor(v) {
  if (v <= 24) return '#c0392b';
  if (v <= 44) return '#e67e22';
  if (v <= 55) return '#d4ac0d';
  if (v <= 75) return '#27ae60';
  return '#1e8449';
}

function renderYieldCurve(fredItems) {
  const byCode = {};
  fredItems.forEach(f => { if (f.code) byCode[f.code] = f; });

  const points = YIELD_MATURITIES.map(m => {
    const s = byCode[m.code];
    if (!s || !s.data || !s.data.length) return null;
    const v = parseFloat(s.data[s.data.length - 1].value);
    return isNaN(v) ? null : { label: m.label, value: v };
  }).filter(Boolean);

  const el = document.getElementById('yield-curve-card');
  if (points.length < 2) { el.style.display = 'none'; return; }

  const W = 500, H = 100, padL = 32, padR = 12, padT = 20, padB = 22;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const vals = points.map(p => p.value);
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const range = maxV - minV || 0.5;
  const xStep = innerW / (points.length - 1);

  const svgPts = points.map((p, i) => ({
    x: padL + i * xStep,
    y: padT + (1 - (p.value - minV) / range) * innerH,
    ...p,
  }));

  const polyline = svgPts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

  // Y-axis ticks
  const yTicks = [minV, (minV + maxV) / 2, maxV].map(v => {
    const y = padT + (1 - (v - minV) / range) * innerH;
    return `<text x="${padL - 4}" y="${y.toFixed(1)}" text-anchor="end" dominant-baseline="middle" fill="#444" font-size="9">${v.toFixed(2)}</text>`;
  }).join('');

  const markers = svgPts.map(p => `
    <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="#3a7bd5"/>
    <text x="${p.x.toFixed(1)}" y="${(p.y - 7).toFixed(1)}" text-anchor="middle" fill="#aaa" font-size="9">${p.value.toFixed(2)}</text>
    <text x="${p.x.toFixed(1)}" y="${(H - 4).toFixed(1)}" text-anchor="middle" fill="#555" font-size="9">${esc(p.label)}</text>
  `).join('');

  el.innerHTML = `
    <div class="yield-curve-title">Yield Curve</div>
    <svg class="yield-curve" viewBox="0 0 ${W} ${H}">
      <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + innerH}" stroke="#2a2a2e" stroke-width="1"/>
      ${yTicks}
      <polyline points="${polyline}" fill="none" stroke="#3a7bd5" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${markers}
    </svg>`;
}

function renderGDPNow(data) {
  const el = document.getElementById('gdpnow-card');
  if (!data) { el.style.display = 'none'; return; }
  const val = data.estimate;
  const color = val >= 0 ? '#27ae60' : '#c0392b';
  const sign = val >= 0 ? '+' : '';
  const spark = sparkline((data.history || []).map(d => ({ value: d.value })), 160, 36);
  el.innerHTML = `
    <div class="fg-title"><a href="${esc(data.url)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">GDPNow</a></div>
    <div class="fg-value" style="color:${color}">${sign}${val.toFixed(1)}<span style="font-size:18px;color:#888">%</span></div>
    <div class="fg-label" style="color:${color}">${esc(data.quarter)}</div>
    <div class="fg-date">${esc(data.date)}</div>
    ${spark}`;
}

function renderFearGreed(data) {
  const el = document.getElementById('fg-card');
  if (!data || !data.length) { el.style.display = 'none'; return; }
  const latest = data[0];
  const val = parseInt(latest.value, 10);
  const color = fgColor(val);
  const label = latest.value_classification || '';
  const date = latest.timestamp ? new Date(parseInt(latest.timestamp, 10) * 1000).toLocaleDateString() : '';
  const historical = [...data].reverse().map(d => ({ value: parseFloat(d.value) }));
  const spark = sparkline(historical, 160, 36);
  el.innerHTML = `
    <div class="fg-title">Crypto Fear &amp; Greed</div>
    <div class="fg-value" style="color:${color}">${val}</div>
    <div class="fg-label" style="color:${color}">${esc(label)}</div>
    <div class="fg-date">${esc(date)}</div>
    ${spark}`;
}

function renderFred(items) {
  const el = document.getElementById('fred-grid');
  const gridItems = items.filter(f => !YIELD_CURVE_CODES.has(f.code));
  document.getElementById('fred-count').textContent = gridItems.length;
  el.innerHTML = gridItems.map(f => {
    const data = f.data || [];
    const latest = data[data.length - 1];
    const latestVal = latest ? Number(latest.value).toLocaleString(undefined, {maximumFractionDigits: 2}) : 'N/A';
    const latestDate = latest ? latest.date : '';
    const spark = sparkline(data);
    const titleHtml = f.url
      ? `<a href="${esc(f.url)}" target="_blank" rel="noopener">${esc(f.title)}</a>`
      : esc(f.title);
    return `<div class="fred-card">
      <div class="fred-title">${titleHtml}</div>
      <div class="fred-latest">${latestVal}<span>${esc(latestDate)}</span></div>
      ${spark}
    </div>`;
  }).join('');
}

function isConsensus(p) {
  const bets = (p.bets || []).filter(b => b.probability > 0);
  return bets.length > 0 && bets.some(b => b.probability >= 0.98) && bets.every(b => b.probability >= 0.98 || b.probability < 0.02);
}

function renderConsensus(rows) {
  const tbody = document.getElementById('consensus-tbody');
  const noResults = document.getElementById('consensus-no-results');
  const pagEl = document.getElementById('consensus-pagination');
  if (!rows.length) { tbody.innerHTML = ''; pagEl.style.display = 'none'; noResults.style.display = ''; return; }
  noResults.style.display = 'none';
  const pageSize = 10;
  const totalPages = Math.ceil(rows.length / pageSize);
  consensusPage = Math.min(consensusPage, totalPages - 1);
  const pageRows = rows.slice(consensusPage * pageSize, (consensusPage + 1) * pageSize);
  tbody.innerHTML = pageRows.map(p => {
    const highBets = (p.bets || []).filter(b => b.probability >= 0.98)
      .sort((a, b) => a.probability - b.probability); // ascending: lowest p first
    const titleHtml = p.url
      ? `<a href="${esc(p.url)}" target="_blank" rel="noopener">${hi(p.title)}</a>`
      : hi(p.title);
    let answersHtml;
    if (highBets.length > 3) {
      const shown = highBets[0]; // most restrictive (lowest p)
      const collapsed = highBets.slice(1); // the trivially-true ones
      const oid = 'cons-other-' + esc(p.id);
      answersHtml = `<div class="bet">
        <span class="bet-label">${hi(shown.prompt)}</span>
        <div class="bet-bar-wrap"><div class="bet-bar high" style="width:100%"></div></div>
        <span class="bet-pct">${Math.round(shown.probability * 100)}%</span>
      </div>
      <div class="bet other-toggle" data-oid="${oid}">
        <span class="bet-label other-label">&#9654; Others &gt;98% (${collapsed.length})</span>
      </div>
      <div class="other-bets" id="${oid}" style="display:none">${collapsed.map(b =>
        `<div class="bet">
          <span class="bet-label">${hi(b.prompt)}</span>
          <div class="bet-bar-wrap"><div class="bet-bar high" style="width:100%"></div></div>
          <span class="bet-pct">${Math.round(b.probability * 100)}%</span>
        </div>`).join('')}
      </div>`;
    } else {
      const winner = highBets[highBets.length - 1]; // highest p for simple case
      answersHtml = `<div class="bet">
        <span class="bet-label">${winner ? hi(winner.prompt) : ''}</span>
        <div class="bet-bar-wrap"><div class="bet-bar high" style="width:100%"></div></div>
        <span class="bet-pct">${winner ? Math.round(winner.probability * 100) + '%' : ''}</span>
      </div>`;
    }
    return `<tr>
      <td class="question">${titleHtml}</td>
      <td class="answers">${answersHtml}</td>
      <td class="topics">${tagsHtml(p.topics, true)}</td>
    </tr>`;
  }).join('');
  if (totalPages <= 1) { pagEl.style.display = 'none'; return; }
  pagEl.style.display = 'flex';
  pagEl.innerHTML = buildPagination(consensusPage, totalPages, pageSize, rows.length, 'goConsensusPage');
}

function goConsensusPage(n) {
  consensusPage = n;
  renderConsensus(currentConsensusRows);
  document.getElementById('consensus-table-wrap').scrollIntoView({behavior: 'smooth', block: 'start'});
}

// Search
let allPredictions = [], allConsensusPredictions = [], allCatalysts = [], allNews = [], allFred = [];
let predIdx, consensusIdx, catIdx, newsIdx, fredIdx;
let predPage = 0, currentPredRows = [];
let consensusPage = 0, currentConsensusRows = [];
let catPage = 0, currentCatRows = [];
let newsPage = 0, currentNewsRows = [];

function getTags(p) {
  return (p.topics || '').split(/[,;]/).map(t => t.trim().toLowerCase()).filter(Boolean);
}

// Tag-diversity re-ranking in O(n): items with a previously-seen tag are deferred
// with half their volume score, then merged back in sorted order.
function diverseSort(items) {
  // items is already sorted desc by volume_24h
  const seen = new Set();
  const primary = [];  // {item, score} — original score
  const deferred = []; // {item, score} — halved score
  for (const item of items) {
    const tags = getTags(item);
    const hasSeenTag = tags.some(t => seen.has(t));
    tags.forEach(t => seen.add(t));
    const score = item.volume_24h || 0;
    (hasSeenTag ? deferred : primary).push({ item, score: hasSeenTag ? score / 2 : score });
  }
  // Merge two desc-sorted lists
  const result = [];
  let di = 0;
  for (const { item, score } of primary) {
    while (di < deferred.length && deferred[di].score > score) result.push(deferred[di++].item);
    result.push(item);
  }
  while (di < deferred.length) result.push(deferred[di++].item);
  return result;
}

function idxSearch(idx, q, items) {
  const hits = new Set(idx.search(q).flatMap(r => r.result));
  return items.filter((_, i) => hits.has(i));
}

function buildIndexes() {
  const mkIdx = (items, getDoc) => {
    const fieldNames = Object.keys(getDoc(items[0] || {}));
    const idx = new FlexSearch.Document({ tokenize: 'forward', document: { id: 'id', index: fieldNames } });
    items.forEach((item, i) => idx.add({ id: i, ...getDoc(item) }));
    return idx;
  };
  const predDoc = p => ({ title: p.title || '', topics: p.topics || '', bets: (p.bets || []).map(b => b.prompt || '').filter(s => !/^(yes|no|up|down)$/i.test(s.trim())).join(' ') });
  predIdx      = mkIdx(allPredictions,          predDoc);
  consensusIdx = mkIdx(allConsensusPredictions,  predDoc);
  catIdx       = mkIdx(allCatalysts,  c => ({ title: c.title || '', topics: c.topics || '', when: c.when || '' }));
  newsIdx      = mkIdx(allNews,       n => ({ title: n.title || '', description: n.description || '' }));
  fredIdx      = mkIdx(allFred,       f => ({ title: f.title || '' }));
}

function applySearch(q) {
  q = q.trim().toLowerCase();
  currentQuery = q;

  const search = (idx, all) => q ? idxSearch(idx, q, all) : all;

  const filteredPreds = search(predIdx, allPredictions);
  document.getElementById('pred-count').textContent =
    q ? `${filteredPreds.length} / ${allPredictions.length}` : allPredictions.length;
  predPage = 0;
  currentPredRows = q ? filteredPreds : diverseSort(filteredPreds);
  renderPredictions(currentPredRows);

  const filteredConsensus = search(consensusIdx, allConsensusPredictions);
  document.getElementById('consensus-count').textContent =
    q ? `${filteredConsensus.length} / ${allConsensusPredictions.length}` : allConsensusPredictions.length;
  consensusPage = 0;
  currentConsensusRows = q ? filteredConsensus : diverseSort(filteredConsensus);
  renderConsensus(currentConsensusRows);

  const filteredCats = search(catIdx, allCatalysts);
  document.getElementById('cat-count').textContent =
    q ? `${filteredCats.length} / ${allCatalysts.length}` : allCatalysts.length;
  catPage = 0;
  currentCatRows = filteredCats;
  renderCatalysts(currentCatRows);

  const filteredNews = search(newsIdx, allNews);
  document.getElementById('news-count').textContent =
    q ? `${filteredNews.length} / ${allNews.length}` : allNews.length;
  newsPage = 0;
  currentNewsRows = filteredNews;
  renderNews(currentNewsRows);

  const filteredFred = search(fredIdx, allFred);
  document.getElementById('fred-count').textContent =
    q ? `${filteredFred.length} / ${allFred.length}` : allFred.length;
  renderFred(filteredFred);
}

const searchInput = document.getElementById('pred-search');
searchInput.addEventListener('input', function() { applySearch(this.value); });

['pred-tbody', 'consensus-tbody', 'catalyst-list'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    const tag = e.target.closest('.clickable-tag');
    if (tag) {
      searchInput.value = tag.dataset.tag;
      applySearch(tag.dataset.tag);
      searchInput.focus();
      return;
    }
    const toggle = e.target.closest('.other-toggle');
    if (toggle) {
      const el = document.getElementById(toggle.dataset.oid);
      if (!el) return;
      const expanded = el.style.display !== 'none';
      el.style.display = expanded ? 'none' : 'block';
      const label = toggle.querySelector('.other-label');
      label.innerHTML = (expanded ? '&#9654;' : '&#9660;') + label.innerHTML.slice(1);
    }
  });
});

// Load data — try root path (gh-pages) then local dev path
fetch('output.json')
  .then(r => r.ok ? r : fetch('.reports/output.json'))
  .then(r => { if (!r.ok) throw new Error(r.statusText); return r.text(); })
  .then(t => JSON.parse(t.replace(/:\s*NaN\b/g, ': null')))
  .then(data => {
const active = (data.relevant_predictions || []).filter(p => p.volume_24h > 0).sort((a, b) => b.volume_24h - a.volume_24h);
    allConsensusPredictions = active.filter(isConsensus);
    allPredictions = active.filter(p => !isConsensus(p));
    allCatalysts   = data.upcoming_catalysts || [];
    allNews        = data.news_headlines || [];
    allFred        = data.fred_data || [];

    buildIndexes();
    applySearch('');

    renderYieldCurve(allFred);
    renderGDPNow(data.gdpnow || null);
    renderFearGreed(data.fear_greed || null);

    const hasMacro = allFred.length || (data.fear_greed && data.fear_greed.length) || data.gdpnow;
    if (!hasMacro) document.getElementById('section-fred').style.display = 'none';
    if (!allNews.length)  document.getElementById('section-news').style.display = 'none';
  })
  .catch(err => {
    console.error(err);
    const banner = document.getElementById('error-banner');
    banner.style.display = 'block';
    banner.innerHTML += `<br><code>${err}</code>`;
  });
</script>
</body>
