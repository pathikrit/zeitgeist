<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeitgeist Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d0d0f;
    color: #e0e0e5;
    font-size: 14px;
    line-height: 1.5;
  }

  header {
    background: #141416;
    border-bottom: 1px solid #2a2a2e;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 { font-size: 18px; font-weight: 600; color: #f0f0f5; }
  header .date { color: #555; font-size: 13px; margin-left: auto; }

  .container { max-width: 1800px; margin: 0 auto; padding: 24px 32px; display: flex; flex-direction: column; gap: 32px; }

  section { background: #141416; border-radius: 12px; border: 1px solid #2a2a2e; overflow: hidden; }

  .section-header {
    padding: 16px 20px;
    border-bottom: 1px solid #222226;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-header h2 { font-size: 15px; font-weight: 600; color: #f0f0f5; }
  .section-header .count {
    background: #222226;
    color: #777;
    border-radius: 20px;
    padding: 1px 8px;
    font-size: 12px;
    font-weight: 500;
  }

  /* Search */
  .search-wrap { padding: 12px 20px; border-bottom: 1px solid #222226; }
  .search-wrap input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #2a2a2e;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    background: #1a1a1e;
    color: #e0e0e5;
    transition: border-color .15s;
  }
  .search-wrap input::placeholder { color: #444; }
  .search-wrap input:focus { border-color: #3a7bd5; background: #1e1e24; }

  /* Predictions table */
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    padding: 10px 20px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: #555;
    background: #111113;
    border-bottom: 1px solid #222226;
    position: sticky;
    top: 49px;
  }
  tbody tr { border-bottom: 1px solid #1c1c20; transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #1a1a1e; }
  td { padding: 12px 20px; vertical-align: top; }

  td.question { max-width: 600px; }
  td.question a { color: #4a9eff; text-decoration: none; font-weight: 500; }
  td.question a:hover { text-decoration: underline; }

  td.answers { min-width: 380px; }
  .bet { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 13px; }
  .bet:last-child { margin-bottom: 0; }
  .bet-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #aaa; }
  .bet-bar-wrap { width: 160px; height: 6px; background: #2a2a2e; border-radius: 3px; flex-shrink: 0; }
  .bet-bar { height: 6px; border-radius: 3px; background: #3a7bd5; }
  .bet-bar.high { background: #2ea84a; }
  .bet-bar.low  { background: #c0392b; }
  .bet-pct { width: 36px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; color: #ccc; font-size: 12px; }

  td.topics .tag {
    display: inline-block;
    background: #1a2340;
    color: #6899e8;
    border-radius: 5px;
    padding: 2px 7px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background .1s;
  }
  td.topics .tag:hover { background: #243060; }

mark { background: #7c5c00; color: #ffd060; border-radius: 2px; padding: 0 1px; }

  .no-results { padding: 40px 20px; text-align: center; color: #444; }

  /* Catalysts */
  .catalyst-list { display: flex; flex-direction: column; }
  .catalyst-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 11px 20px;
    border-bottom: 1px solid #1c1c20;
  }
  .catalyst-row:last-child { border-bottom: none; }
  .catalyst-when {
    flex-shrink: 0;
    font-size: 12px;
    color: #555;
    width: 110px;
  }
  .catalyst-title { flex: 1; color: #ccc; }
  .catalyst-title a { color: #4a9eff; text-decoration: none; }
  .catalyst-title a:hover { text-decoration: underline; }
  .catalyst-topics .tag {
    display: inline-block;
    background: #2a1f10;
    color: #c8893a;
    border-radius: 5px;
    padding: 2px 7px;
    font-size: 12px;
    font-weight: 500;
    flex-shrink: 0;
  }

  /* News */
  .news-list { display: flex; flex-direction: column; }
  .news-row {
    padding: 11px 20px;
    border-bottom: 1px solid #1c1c20;
  }
  .news-row:last-child { border-bottom: none; }
  .news-row a { color: #ddd; text-decoration: none; font-weight: 500; }
  .news-row a:hover { color: #4a9eff; }
  .news-desc { color: #555; font-size: 13px; margin-top: 2px; }

  /* FRED */
  .fred-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0;
  }
  .fred-card {
    padding: 14px 20px;
    border-right: 1px solid #1c1c20;
    border-bottom: 1px solid #1c1c20;
  }
  .fred-card:hover { background: #1a1a1e; }
  .fred-title { font-weight: 600; font-size: 13px; margin-bottom: 6px; color: #aaa; }
  .fred-title a { color: #aaa; text-decoration: none; }
  .fred-title a:hover { color: #4a9eff; }
  .fred-latest {
    font-size: 22px;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    margin-bottom: 6px;
    color: #f0f0f5;
  }
  .fred-latest span { font-size: 13px; color: #444; font-weight: 400; margin-left: 6px; }
  svg.sparkline { display: block; overflow: visible; }

  /* Error */
  #error-banner {
    display: none;
    background: #2a1f10;
    border: 1px solid #5a3a10;
    border-radius: 8px;
    padding: 16px 20px;
    margin: 24px 32px 0;
    font-size: 13px;
    color: #c8893a;
  }
  #error-banner code { background: #1a1208; padding: 1px 4px; border-radius: 3px; font-family: monospace; }
</style>
</head>
<body>

<header>
  <span class="date" id="report-date"></span>
</header>

<div id="error-banner">
  Could not load <strong>.reports/output.json</strong>. If opening from <code>file://</code>, serve locally instead:<br>
  <code>python3 -m http.server 8000</code> then open <code>http://localhost:8000/dashboard.html</code>
</div>

<div class="container">

  <section id="section-predictions">
    <div class="section-header">
      <h2>Prediction Markets</h2>
      <span class="count" id="pred-count"></span>
    </div>
    <div class="search-wrap">
      <input type="search" id="pred-search" placeholder="Search all sections..." autocomplete="off">
    </div>
    <div id="pred-table-wrap">
      <table>
        <thead style="display:none"></thead>
        <tbody id="pred-tbody"></tbody>
      </table>
      <div class="no-results" id="pred-no-results" style="display:none">No matching predictions</div>
    </div>
  </section>

  <section id="section-catalysts">
    <div class="section-header">
      <h2>Upcoming Catalysts</h2>
      <span class="count" id="cat-count"></span>
    </div>
    <div class="catalyst-list" id="catalyst-list"></div>
  </section>

  <section id="section-news">
    <div class="section-header">
      <h2>News Headlines</h2>
      <span class="count" id="news-count"></span>
    </div>
    <div class="news-list" id="news-list"></div>
  </section>

  <section id="section-fred">
    <div class="section-header">
      <h2>FRED Economic Data</h2>
      <span class="count" id="fred-count"></span>
    </div>
    <div class="fred-grid" id="fred-grid"></div>
  </section>

</div>

<script>
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

let currentQuery = '';
function hi(s) {
  const safe = esc(s);
  if (!currentQuery) return safe;
  const re = new RegExp(`(${currentQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

function barColor(p) {
  if (p >= 0.65) return 'high';
  if (p <= 0.25) return 'low';
  return '';
}

function renderPredictions(rows) {
  const tbody = document.getElementById('pred-tbody');
  if (!rows.length) {
    tbody.innerHTML = '';
    document.getElementById('pred-no-results').style.display = '';
    return;
  }
  document.getElementById('pred-no-results').style.display = 'none';
  tbody.innerHTML = rows.map(p => {
    const sortedBets = (p.bets || []).filter(b => b.probability > 0.01).sort((a, b) => b.probability - a.probability);
    const betsHtml = sortedBets.map(b => {
      const pct = Math.round(b.probability * 100);
      const cls = barColor(b.probability);
      return `<div class="bet">
        <span class="bet-label" title="${esc(b.prompt)}">${hi(b.prompt)}</span>
        <div class="bet-bar-wrap"><div class="bet-bar ${cls}" style="width:${pct}%"></div></div>
        <span class="bet-pct">${pct}%</span>
      </div>`;
    }).join('');
    const titleHtml = p.url
      ? `<a href="${esc(p.url)}" target="_blank" rel="noopener">${hi(p.title)}</a>`
      : hi(p.title);
    return `<tr data-title="${esc(p.title)}" data-topics="${esc(p.topics||'')}">
      <td class="question">${titleHtml}</td>
      <td class="answers">${betsHtml}</td>
      <td class="topics">${(p.topics || '').split(',').map(t => t.trim()).filter(Boolean).map(t => `<span class="tag clickable-tag" data-tag="${esc(t)}">${hi(t)}</span>`).join(' ')}</td>
    </tr>`;
  }).join('');
}

function renderCatalysts(items) {
  const el = document.getElementById('catalyst-list');
  document.getElementById('cat-count').textContent = items.length;
  el.innerHTML = items.map(c => {
    const titleHtml = c.url
      ? `<a href="${esc(c.url)}" target="_blank" rel="noopener">${esc(c.title)}</a>`
      : esc(c.title);
    return `<div class="catalyst-row">
      <span class="catalyst-when">${esc(c.when || '')}</span>
      <span class="catalyst-title">${titleHtml}</span>
      ${c.topics ? `<span class="catalyst-topics"><span class="tag">${esc(c.topics)}</span></span>` : ''}
    </div>`;
  }).join('');
}

function renderNews(items) {
  const el = document.getElementById('news-list');
  document.getElementById('news-count').textContent = items.length;
  el.innerHTML = items.map(n => {
    const titleHtml = n.url
      ? `<a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.title)}</a>`
      : esc(n.title);
    return `<div class="news-row">
      <div>${titleHtml}</div>
      ${n.description ? `<div class="news-desc">${esc(n.description)}</div>` : ''}
    </div>`;
  }).join('');
}

function sparkline(data, width=120, height=32) {
  const vals = data.map(d => d.value).filter(v => v != null && !isNaN(v));
  if (vals.length < 2) return '';
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const pad = 2;
  const pts = vals.map((v, i) => {
    const x = pad + (i / (vals.length - 1)) * (width - pad * 2);
    const y = pad + (1 - (v - min) / range) * (height - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg class="sparkline" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
    <polyline points="${pts}" fill="none" stroke="#3a7bd5" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function renderFred(items) {
  const el = document.getElementById('fred-grid');
  document.getElementById('fred-count').textContent = items.length;
  el.innerHTML = items.map(f => {
    const data = f.data || [];
    const latest = data[data.length - 1];
    const latestVal = latest ? Number(latest.value).toLocaleString(undefined, {maximumFractionDigits: 2}) : 'N/A';
    const latestDate = latest ? latest.date : '';
    const spark = sparkline(data);
    const titleHtml = f.url
      ? `<a href="${esc(f.url)}" target="_blank" rel="noopener">${esc(f.title)}</a>`
      : esc(f.title);
    return `<div class="fred-card">
      <div class="fred-title">${titleHtml}</div>
      <div class="fred-latest">${latestVal}<span>${esc(latestDate)}</span></div>
      ${spark}
    </div>`;
  }).join('');
}

// Search
let allPredictions = [], allCatalysts = [], allNews = [], allFred = [];

function applySearch(q) {
  q = q.trim().toLowerCase();
  currentQuery = q;

  const filteredPreds = q
    ? allPredictions.filter(p =>
        (p.title || '').toLowerCase().includes(q) ||
        (p.topics || '').toLowerCase().includes(q) ||
        (p.bets || []).some(b => (b.prompt || '').toLowerCase().includes(q))
      )
    : allPredictions;
  document.getElementById('pred-count').textContent =
    q ? `${filteredPreds.length} / ${allPredictions.length}` : allPredictions.length;
  renderPredictions(filteredPreds);

  const filteredCats = q
    ? allCatalysts.filter(c =>
        (c.title || '').toLowerCase().includes(q) ||
        (c.topics || '').toLowerCase().includes(q) ||
        (c.when || '').toLowerCase().includes(q)
      )
    : allCatalysts;
  document.getElementById('cat-count').textContent =
    q ? `${filteredCats.length} / ${allCatalysts.length}` : allCatalysts.length;
  renderCatalysts(filteredCats);

  const filteredNews = q
    ? allNews.filter(n =>
        (n.title || '').toLowerCase().includes(q) ||
        (n.description || '').toLowerCase().includes(q)
      )
    : allNews;
  document.getElementById('news-count').textContent =
    q ? `${filteredNews.length} / ${allNews.length}` : allNews.length;
  renderNews(filteredNews);

  const filteredFred = q
    ? allFred.filter(f => (f.title || '').toLowerCase().includes(q))
    : allFred;
  document.getElementById('fred-count').textContent =
    q ? `${filteredFred.length} / ${allFred.length}` : allFred.length;
  renderFred(filteredFred);
}

const searchInput = document.getElementById('pred-search');
searchInput.addEventListener('input', function() { applySearch(this.value); });

document.getElementById('pred-tbody').addEventListener('click', function(e) {
  const tag = e.target.closest('.clickable-tag');
  if (!tag) return;
  searchInput.value = tag.dataset.tag;
  applySearch(tag.dataset.tag);
  searchInput.focus();
});

// Load data
fetch('.reports/output.json')
  .then(r => { if (!r.ok) throw new Error(r.statusText); return r.text(); })
  .then(t => JSON.parse(t.replace(/:\s*NaN\b/g, ': null')))
  .then(data => {
    if (data.date) document.getElementById('report-date').textContent = data.date;

    allPredictions = (data.relevant_predictions || []).sort((a, b) => (b.volume_24h || 0) - (a.volume_24h || 0));
    allCatalysts   = data.upcoming_catalysts || [];
    allNews        = data.news_headlines || [];
    allFred        = data.fred_data || [];

    applySearch('');

    if (!allFred.length)  document.getElementById('section-fred').style.display = 'none';
    if (!allNews.length)  document.getElementById('section-news').style.display = 'none';
  })
  .catch(err => {
    console.error(err);
    const banner = document.getElementById('error-banner');
    banner.style.display = 'block';
    banner.innerHTML += `<br><code>${err}</code>`;
  });
</script>
</body>
</html>
